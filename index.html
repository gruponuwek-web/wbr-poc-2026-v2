<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBR Sistema v3 - Gestión Comercial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- NAVBAR -->
        <div class="navbar">
            <h1>🎖️ WBR Sistema v3 - Gestión Comercial</h1>
            <div class="user-info">
                <span id="userDisplay">Coordinador</span>
                <span id="fechaHora"></span>
            </div>
        </div>

        <div class="sidebar">
            <!-- MENÚ -->
            <div class="menu">
                <button onclick="showSection('dashboard')" class="menu-btn active">📊 Dashboard</button>
                <button onclick="showSection('compromisos')" class="menu-btn">📝 Compromisos</button>
                <button onclick="showSection('wbr')" class="menu-btn">📅 WBR</button>
            </div>

            <!-- CONTENIDO -->
            <div class="content">
                <!-- DASHBOARD -->
                <section id="dashboard" class="section active">
                    <h2>📊 Dashboard</h2>
                    <div id="dashboardContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </section>

                <!-- COMPROMISOS -->
                <section id="compromisos" class="section">
                    <h2>📝 Compromisos</h2>
                    
                    <div class="form-grid-2x2">
                        <div class="form-group">
                            <label>Mes:</label>
                            <select id="comp_mes" onchange="cargarCompromisos()">
                                <option value="Junio" selected>Junio</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Vendedor:</label>
                            <select id="comp_vendedor"></select>
                        </div>
                        
                        <div class="form-group">
                            <label>Cliente:</label>
                            <input type="text" id="comp_cliente" placeholder="Nombre o código de cliente">
                        </div>
                        
                        <div class="form-group">
                            <label>Clasificación:</label>
                            <select id="comp_clasificacion">
                                <option value="">-- Seleccionar --</option>
                                <option value="Prospección">Prospección</option>
                                <option value="Crecimiento">Crecimiento</option>
                                <option value="Recuperado">Recuperado</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="filter-container">
                        <label>Estado:</label>
                        <select id="comp_filtro_estado" onchange="cargarCompromisos()">
                            <option value="Pendiente" selected>Pendiente</option>
                            <option value="Completado">Completado</option>
                            <option value="No Completado">No Completado</option>
                        </select>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Mes</th>
                                <th>Vendedor</th>
                                <th>Cliente</th>
                                <th>Clasificación</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="compromisosTableBody">
                            <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </section>

                <!-- WBR -->
                <section id="wbr" class="section">
                    <h2>📅 Weekly Business Review</h2>
                    <div id="wbrContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="api-handler.js"></script>
    <script src="app.js"></script>
</body>
</html>
