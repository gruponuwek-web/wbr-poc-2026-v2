<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBR Sistema v3 - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- NAVBAR -->
        <div class="navbar">
            <h1>🎖️ WBR Sistema v3 - Gestión Comercial</h1>
            <div class="user-info">
                <span id="userDisplay">Coordinador</span>
                <span id="fechaHora"></span>
            </div>
        </div>

        <div class="sidebar">
            <!-- MENÚ -->
            <div class="menu">
                <button onclick="showSection('dashboard')" class="menu-btn active">📊 Dashboard</button>
                <button onclick="showSection('compromisos')" class="menu-btn">📝 Compromisos</button>
            </div>

            <!-- CONTENIDO -->
            <div class="content">
                <!-- DASHBOARD -->
                <section id="dashboard" class="section active">
                    <h2>📊 Dashboard</h2>
                    <div id="dashboardContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </section>

                <!-- COMPROMISOS -->
                <section id="compromisos" class="section">
                    <h2>📝 Compromisos</h2>
                    <div id="compromisosContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="api-handler.js"></script>
    <script src="app.js"></script>
</body>
</html>
