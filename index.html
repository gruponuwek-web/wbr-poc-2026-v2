<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBR Sistema v3 - Gestión Comercial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- NAVBAR -->
        <div class="navbar">
            <h1>🎖️ WBR Sistema v3 - Gestión Comercial</h1>
            <div class="user-info">
                <span id="userDisplay">Coordinador</span>
                <span id="fechaHora"></span>
            </div>
        </div>

        <div class="sidebar">
            <!-- MENÚ -->
            <div class="menu">
                <button onclick="showSection('dashboard')" class="menu-btn active">📊 Dashboard</button>
                <button onclick="showSection('compromisos')" class="menu-btn">📝 Compromisos</button>
                <button onclick="showSection('wbr')" class="menu-btn">📅 WBR</button>
                <button onclick="showSection('acciones')" class="menu-btn">📋 Acciones</button>
            </div>

            <!-- CONTENIDO -->
            <div class="content">
                <!-- DASHBOARD -->
                <section id="dashboard" class="section active">
                    <h2>📊 Dashboard</h2>
                    <div id="dashboardContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </section>

                <!-- COMPROMISOS -->
                <section id="compromisos" class="section">
                    <h2>📝 Compromisos</h2>
                    
                    <div class="form-grid-2x2">
                        <div class="form-group">
                            <label>Mes:</label>
                            <select id="comp_mes" onchange="cargarCompromisos()">
                                <option value="Junio" selected>Junio</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Vendedor:</label>
                            <select id="comp_vendedor"></select>
                        </div>
                        
                        <div class="form-group">
                            <label>Cliente:</label>
                            <input type="text" id="comp_cliente" placeholder="Nombre o código de cliente">
                        </div>
                        
                        <div class="form-group">
                            <label>Clasificación:</label>
                            <select id="comp_clasificacion">
                                <option value="">-- Seleccionar --</option>
                                <option value="Prospección">Prospección</option>
                                <option value="Crecimiento">Crecimiento</option>
                                <option value="Recuperado">Recuperado</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-success" onclick="agregarCompromiso()">💾 Guardar Compromiso</button>
                    
                    <div class="filter-container">
                        <label>Estado:</label>
                        <select id="comp_filtro_estado" onchange="cargarCompromisos()">
                            <option value="Pendiente" selected>Pendiente</option>
                            <option value="Completado">Completado</option>
                            <option value="No Completado">No Completado</option>
                        </select>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Mes</th>
                                <th>Vendedor</th>
                                <th>Cliente</th>
                                <th>Clasificación</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="compromisosTableBody">
                            <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </section>

                <!-- WBR -->
                <section id="wbr" class="section">
                    <h2>📅 Weekly Business Review</h2>
                    
                    <!-- TABS -->
                    <div class="wbr-tabs">
                        <button class="wbr-tab active" onclick="mostrarTab('nueva-sesion')">📅 Nueva sesión</button>
                        <button class="wbr-tab" onclick="mostrarTab('historial')">📋 Historial</button>
                    </div>
                    
                    <!-- VISTA 1: PRE-SESIÓN -->
                    <div id="vista-pre-sesion" class="wbr-vista-pre">
                        <div class="wbr-header-pre">
                            <div>
                                <span id="mes-display">Junio</span>
                                <span> | # Semana <span id="semana-display">24</span> de 52</span>
                            </div>
                            <button class="btn-success" onclick="crearNuevaWBR()">➕ Crear Sesión</button>
                        </div>
                    </div>
                    
                    <!-- VISTA 2: POST-SESIÓN -->
                    <div id="vista-post-sesion" style="display: none;">
                        <div class="wbr-header-post">
                            <h3 id="titulo-sesion">WBR - Junio Semana 24</h3>
                            <div class="wbr-botones-header">
                                <button class="btn-primary" onclick="descargarPDF()" style="display: none;" id="btn-pdf">📄 PDF</button>
                                <button class="btn-danger" onclick="cerrarWBR()">🔒 Cerrar Sesión</button>
                            </div>
                        </div>
                        
                        <!-- ACORDEONES VENDEDORES -->
                        <div id="wbr-vendedores-container" class="wbr-vendedores"></div>
                    </div>
                    
                    <!-- HISTORIAL -->
                    <div id="vista-historial" style="display: none;">
                        <h3>📋 Historial de Sesiones</h3>
                        <div id="wbr-historial-list"></div>
                    </div>
                </section>
                <!-- ACCIONES -->
                <section id="acciones" class="section">
                    <h2>📋 Gestor de Acciones</h2>
                    
                    <!-- TABS VISTAS -->
                    <div class="acciones-tabs">
                        <button class="acciones-tab active" onclick="mostrarVistaAcciones('semanal')">📅 Semanal</button>
                        <button class="acciones-tab" onclick="mostrarVistaAcciones('mensual')">📆 Mensual</button>
                    </div>
                    
                    <!-- VISTA SEMANAL (KANBAN) -->
                    <div id="vista-semanal" class="acciones-vista active">
                        <div class="kanban-container" id="kanban-semanal"></div>
                        <div class="acciones-clasificadas" id="clasificadas-semanal"></div>
                    </div>
                    
                    <!-- VISTA MENSUAL -->
                    <div id="vista-mensual" class="acciones-vista">
                        <div class="calendario-container" id="calendario-mensual"></div>
                        <div class="acciones-clasificadas" id="clasificadas-mensual"></div>
                    </div>
                </section>

    <div id="modalAccion" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Agregar Acción</h3>
                <span id="vendedorModalNombre"></span>
            </div>
            
            <div class="form-group">
                <label>Tipo:</label>
                <select id="accion_tipo">
                    <option value="">-- Seleccionar --</option>
                    <option value="Seguimiento">Seguimiento</option>
                    <option value="Email">Email</option>
                    <option value="Llamada">Llamada</option>
                    <option value="Reunión">Reunión</option>
                    <option value="Otra">Otra</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Descripción:</label>
                <textarea id="accion_descripcion" placeholder="Detalle de la acción" style="min-height: 80px;"></textarea>
            </div>
            
            <div class="form-group">
                <label>Vencimiento:</label>
                <input type="date" id="accion_vencimiento">
            </div>
            
            <div class="form-group">
                <label>Responsable:</label>
                <input type="text" id="accion_responsable" placeholder="Nombre o equipo">
            </div>
            
            <div class="modal-footer">
                <button class="btn-success" onclick="guardarAccion()">Guardar</button>
                <button class="btn-danger" onclick="cerrarModalAccion()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="api-handler.js"></script>
    <script src="app.js"></script>
</body>
</html>
